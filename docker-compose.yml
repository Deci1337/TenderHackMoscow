services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tenderhack
      POSTGRES_USER: tenderhack
      POSTGRES_PASSWORD: tenderhack_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/scripts/init_extensions.sql:/docker-entrypoint-initdb.d/01_extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderhack"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
      - model_cache:/root/.cache
    environment:
      DATABASE_URL: postgresql+asyncpg://tenderhack:tenderhack_secret@db:5432/tenderhack
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
      EMBEDDING_MODEL: cointegrated/rubert-tiny2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  model_cache:
